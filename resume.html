<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Jeth Gomez | Resume</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#f8fafc;
      --text:#0f172a;
      --muted:#64748b;
      --accent:#4f46e5;
      --border:#e2e8f0;
    }

    *{margin:0;padding:0;box-sizing:border-box;}

    body{
      font-family:Inter, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    header{
      position:fixed;
      top:0;
      width:100%;
      padding:18px 40px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      background:rgba(255,255,255,0.75);
      backdrop-filter:blur(12px);
      border-bottom:1px solid var(--border);
    }

    nav a{
      margin-left:18px;
      text-decoration:none;
      color:var(--muted);
      font-weight:500;
    }

    nav a:hover{color:var(--text);}

    .container{
      padding:140px 15% 80px;
    }

    iframe{
      width:100%;
      height:900px;
      border:none;
      border-radius:12px;
    }

    h1{
      font-size:42px;
      margin-bottom:20px;
    }

  </style>
</head>

<body>

<header>
  <div><strong>Jeth Gomez</strong></div>
  <nav>
    <a href="index.html">About</a>
    <a href="resume.html">Resume</a>
    <a href="projects.html">Projects</a>
  </nav>
</header>

<div class="container">
  <h1>Resume</h1>
  <iframe src="resume.pdf"></iframe>
</div>

</body>
</html>
